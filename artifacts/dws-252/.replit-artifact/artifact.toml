kind = "web"
previewPath = "/"
title = "DWS 252 이민 신청"
version = "1.0.0"
id = "artifacts/dws-252"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25779

[services.development]
run = "pnpm --filter @workspace/dws-252 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dws-252", "run", "build" ]
publicDir = "artifacts/dws-252/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25779"
BASE_PATH = "/"
